# Opera Platform — Root Test Pyramid Configuration
# Scope: tests/ directory only. Does not affect service/server/tests/.
#
# Run (when gates are enabled):
#   python3 -m pytest tests/ -c tests/pytest.ini
#
# Release gate tiers:
#   T0 — unit + contract (pre-merge)
#   T1 — integration (staging deploy)
#   T2 — e2e + security + performance (production release)

[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -ra
    --tb=short

markers =
    unit: Fast, isolated tests with no external I/O (T0 gate)
    integration: Multi-module flows against in-memory or staging DB (T1 gate)
    contract: OpenAPI and agent-skill contract validation (T0 gate)
    e2e: HTTP-level smoke journeys across API surface (T2 gate)
    security: Auth boundary, timing, and escalation tests (T2 gate)
    performance: Latency budget and load benchmarks (T2 gate, non-blocking)
    slow: Tests exceeding 5s wall-clock; excluded from default CI shard
    flaky: Known intermittent; quarantined until OPERA-INFRA-901 resolved

filterwarnings =
    ignore::DeprecationWarning
